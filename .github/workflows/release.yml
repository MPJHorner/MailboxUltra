name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build universal .app + .dmg
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-mac

      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT: ${{ github.event_name }}
        run: |
          if [[ "$EVENT" == "push" ]]; then
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build icon
        run: make icon

      - name: Build per-arch .app + .dmg
        run: |
          ./mac/build-app.sh aarch64-apple-darwin
          ./mac/build-dmg.sh aarch64-apple-darwin
          ./mac/build-app.sh x86_64-apple-darwin
          ./mac/build-dmg.sh x86_64-apple-darwin

      - name: Build universal .app + .dmg
        run: ./mac/build-app-universal.sh

      - name: Stage release files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          cp "target/aarch64-apple-darwin/release/MailBoxUltra-${VERSION}-aarch64-apple-darwin.dmg"      release/
          cp "target/aarch64-apple-darwin/release/MailBoxUltra-${VERSION}-aarch64-apple-darwin.dmg.sha256" release/
          cp "target/x86_64-apple-darwin/release/MailBoxUltra-${VERSION}-x86_64-apple-darwin.dmg"        release/
          cp "target/x86_64-apple-darwin/release/MailBoxUltra-${VERSION}-x86_64-apple-darwin.dmg.sha256" release/
          cp "target/universal-apple-darwin/release/MailBoxUltra-${VERSION}-universal.dmg"               release/
          cp "target/universal-apple-darwin/release/MailBoxUltra-${VERSION}-universal.dmg.sha256"        release/
          ls -la release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*.dmg
            release/*.sha256
