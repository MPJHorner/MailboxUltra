# Codecov configuration. The badge in the README reflects what's reported here.
#
# We exclude two regions from coverage on purpose:
#
# - src/main.rs   -- eframe + tokio runtime boot shim. Cannot be driven
#                    deterministically from a unit-test runner.
# - src/gui/**    -- egui rendering code. Immediate-mode UI, no clean
#                    headless surface; the data structures it consumes
#                    (settings, server, store, message) are all tested
#                    independently.

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 90%
        threshold: 5%

ignore:
  - "src/main.rs"
  - "src/gui/**"
  - "tools/**"

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
